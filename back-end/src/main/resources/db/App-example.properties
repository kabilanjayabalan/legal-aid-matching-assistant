spring.application.name=legal-aid-backend

# Database Configuration
spring.datasource.url=Your_db_url
spring.datasource.username=Your_Username
spring.datasource.password=your_dp_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# JWT Secret Configuration
# Using a strong Base64 encoded key (at least 256 bits).
# Changed env var to LEGAL_AID_JWT_SECRET to avoid conflict with potentially weak JWT_SECRET env var.
app.jwtSecret=Your_Token
# Access token expiry: 1 hour
app.jwtExpirationMs=3600000
# Refresh token expiry: 7 days
app.jwtRefreshExpirationMs=604800000

# OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=Your_client_id
spring.security.oauth2.client.registration.google.client-secret=Your_client_secret
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub
app.oauth2.redirectUri=${APP_OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/callback}

# ========= Rate Limiting Configuration =========
# Enable/disable rate limiting globally
app.rate-limit.enabled=true

# Rate limits per minute for different endpoint categories
# Auth endpoints (login, registration, etc.) - stricter limit to prevent brute force
app.rate-limit.auth-requests-per-minute=5

# Admin endpoints (admin panel, analytics, actuator) - higher limit for admin users
app.rate-limit.admin-requests-per-minute=200

# Public API endpoints (/api/**) - moderate limit
app.rate-limit.public-requests-per-minute=300

# Default rate limit for all other endpoints
app.rate-limit.default-requests-per-minute=200

# Cache expiration time for rate limit buckets (in minutes)
# Buckets are automatically cleaned up after this period of inactivity
app.rate-limit.cache-expiration-minutes=60

# Server Configuration
server.port=8080

# Logging configuration
logging.file.name=logs/legalaid-backend.log
logging.level.com.legalaid=INFO
logging.level.org.springframework=INFO

# Multipart file upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Enable Virtual Threads (Project Loom) for better performance
spring.threads.virtual.enabled=true

# ========= Spring Boot Actuator Configuration =========
# Enable all actuator endpoints for admin monitoring
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers,env,threaddump,heapdump,scheduledtasks,caches,beans,mappings,httptrace
management.endpoint.health.show-details=when_authorized
management.endpoint.health.show-components=when_authorized

# Enable health checks for various components
management.health.diskspace.enabled=true
management.health.db.enabled=true

# Custom actuator base path for security (only ADMIN role can access)
management.endpoints.web.base-path=/actuator
management.server.port=${server.port}

# Application info for actuator /info endpoint
management.info.env.enabled=true
info.app.name=Legal Aid Matching Platform
info.app.description=A platform connecting citizens with legal aid providers
info.app.version=1.0.0
info.app.java.version=${java.version}

# Prometheus metrics configuration
management.prometheus.metrics.export.enabled=true

# ========= Email Configuration (Gmail SMTP) =========
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=Your_mail_id
# Removed spaces from app password to ensure compatibility
spring.mail.password=Your_mail_pass

spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
