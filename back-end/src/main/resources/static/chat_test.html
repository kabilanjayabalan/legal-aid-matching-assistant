<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Legal Aid Chat</title>

  <!-- STOMP -->
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

  <style>
    body {
      font-family: Arial;
      width: 420px;
      margin: 40px auto;
    }

    #messages {
      border: 1px solid #ccc;
      height: 280px;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
      background: #fafafa;
    }

    .msg {
      max-width: 75%;
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      word-wrap: break-word;
    }

    .me {
      background-color: #dbeafe;
      margin-left: auto;
      text-align: right;
    }

    .other {
      background-color: #e5e5e5;
      margin-right: auto;
      text-align: left;
    }

    .time {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
    }

    input {
      width: 100%;
      padding: 6px;
      margin-bottom: 8px;
    }

    button {
      width: 100%;
      padding: 6px;
      cursor: pointer;
    }

    #status {
      font-size: 14px;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>

<h3>Chat</h3>

<input id="jwt" placeholder="Paste JWT token here" />
<button onclick="connect()">Connect</button>

<p id="status">Status: Disconnected</p>

<hr/>

<div id="messages"></div>

<input id="text" placeholder="Type message..." />
<button onclick="sendMessage()">Send</button>

<script>
  const MATCH_ID = 38;

  let stompClient = null;
  let JWT = null;
  let isConnected = false;
  let LOGGED_IN_USER_ID = null;

  /* ----------- FETCH LOGGED-IN USER ID ----------- */

  async function loadMe() {
    const res = await fetch("http://localhost:8080/chats/me", {
      headers: { Authorization: "Bearer " + JWT }
    });

    if (!res.ok) throw new Error("Cannot resolve user");

    LOGGED_IN_USER_ID = await res.json();
  }

  /* ----------- LOAD CHAT HISTORY ----------- */

  async function loadHistory() {
    const res = await fetch(
      "http://localhost:8080/chats/" + MATCH_ID,
      { headers: { Authorization: "Bearer " + JWT } }
    );

    if (!res.ok) throw new Error("History failed");

    const chats = await res.json();
    chats.forEach(renderMessage);
  }

  /* ----------- CONNECT ----------- */

  async function connect() {
    JWT = document.getElementById("jwt").value.trim();
    if (!JWT) {
      alert("Paste JWT");
      return;
    }

    document.getElementById("messages").innerHTML = "";
    document.getElementById("status").innerText = "Status: Connecting...";
    isConnected = false;

    try {
      await loadMe();       // 🔥 CRITICAL
      await loadHistory();  // 🔥 CRITICAL
    } catch (e) {
      alert("Auth or history failed");
      return;
    }

    const socket = new WebSocket("ws://localhost:8080/ws-chat");
    stompClient = Stomp.over(socket);
    stompClient.debug = null;

    stompClient.connect(
      { Authorization: "Bearer " + JWT },
      () => {
        isConnected = true;
        document.getElementById("status").innerText = "Status: Connected";

        stompClient.subscribe("/topic/chat/" + MATCH_ID, msg => {
          renderMessage(JSON.parse(msg.body));
        });
      }
    );
  }

  /* ----------- SEND ----------- */

  function sendMessage() {
    if (!isConnected) return alert("Not connected");

    const input = document.getElementById("text");
    const message = input.value.trim();
    if (!message) return;

    stompClient.send(
      "/app/chat.send/" + MATCH_ID,
      {},
      JSON.stringify({ message })
    );

    input.value = "";
  }

  /* ----------- TIME FORMAT ----------- */

  function formatTime(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  /* ----------- RENDER ----------- */

  function renderMessage(chat) {
    const box = document.getElementById("messages");

    const div = document.createElement("div");
    const isMe = chat.senderId === LOGGED_IN_USER_ID;

    div.className = "msg " + (isMe ? "me" : "other");

    const text = document.createElement("div");
    text.textContent = chat.message;

    const meta = document.createElement("div");
    meta.className = "time";
    meta.textContent = (isMe ? "You • " : "Them • ") + formatTime(chat.createdAt);

    div.appendChild(text);
    div.appendChild(meta);
    box.appendChild(div);

    box.scrollTop = box.scrollHeight;
  }
</script>


</body>
</html>
